<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Pokerthon Admin{% endblock %}</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
<nav>
  <strong>🂡 Pokerthon Admin</strong>
  <a href="/admin/">Dashboard</a>
  <a href="/admin/accounts">계정</a>
  <a href="/admin/tables">테이블</a>
  <a href="/admin/logout" style="margin-left:auto">로그아웃</a>
</nav>
<div class="container">
  {% if flash %}
    <div class="alert alert-{{ flash.type }}">{{ flash.message }}</div>
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
