[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# releaseCommand runs once per deploy (not on cold-start wakeups) — ideal for migrations
releaseCommand = "alembic upgrade head"
# startCommand removed — Dockerfile CMD handles PORT with ${PORT:-8000} fallback
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
