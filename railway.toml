[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "set -e && echo '=== STARTING ALEMBIC ===' && alembic upgrade head && echo '=== ALEMBIC DONE, STARTING UVICORN ===' && exec uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
